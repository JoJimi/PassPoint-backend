spring:
  application:
    name: PassPoint

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    consumer:
      group-id: passpoint
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.example.passpoint.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3

google:
  client-id: ${GOOGLE_CLIENT_ID}

firebase:
  credentials-json: ${FIREBASE_CREDENTIALS_JSON}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000      # 30분 (밀리초)
  refresh-token-validity: 1209600000  # 14일 (밀리초)

server:
  port: 8080

management:
  health:
    elasticsearch:
      enabled: false

cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT}
      bucket: ${S3_BUCKET}
      region: ${S3_REGION}
      access-key: ${S3_ACCESS_KEY:}    # 운영은 비워두고 EC2 IAM Role로 폴백
      secret-key: ${S3_SECRET_KEY:}
      path-style: ${S3_PATH_STYLE}
      presigned-url-expiry-minutes: 5
      public-endpoint: ${S3_PUBLIC_ENDPOINT:}  # 실디바이스용
