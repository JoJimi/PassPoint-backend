spring:
  application:
    name: PassPoint

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 290000        # 커넥션 최대 수명 (약 4.8분)
      keepalive-time: 120000      # 2분마다 연결 살아있는지 확인
      connection-timeout: 10000   # 연결 못 얻으면 10초 후 포기

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  elasticsearch:
    uris: http://localhost:9200

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: passpoint
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.example.passpoint.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3

google:
  client-id: ${GOOGLE_CLIENT_ID}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000      # 30분 (밀리초)
  refresh-token-validity: 1209600000  # 14일 (밀리초)

server:
  port: 8080

management:
  health:
    elasticsearch:
      enabled: false

cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT}
      bucket: ${S3_BUCKET}
      region: ${S3_REGION}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      path-style: ${S3_PATH_STYLE}
      presigned-url-expiry-minutes: 5