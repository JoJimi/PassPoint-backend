asspoint-ci-dummy.iam.gserviceaccount.com","client_id":"000000000000000000000","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_x509_cert_url":"https://www.googleapis.com/robot/v1/metadata/x509/firebase-adminsdk-dummy%40passpoint-ci-dummy.iam.gserviceaccount.com","universe_domain":"googleapis.com"}'
      # dev 프로필이 기본이라 application-dev.yml의 플레이스홀더도 채워줘야 함 (Testcontainers가 실제 연결은 덮어씀)
      POSTGRES_DB: passpoint
      POSTGRES_USER: passpoint
      POSTGRES_PASSWORD: passpoint
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: passpoint-audio
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PATH_STYLE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build jar
        run: ./gradlew bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: passpoint:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # D1(인프라 EC2)·D4(CodeDeploy+ALB)가 준비되기 전까지는 비활성화.
  # ECR 리포지토리/CodeDeploy 애플리케이션을 만들고 AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_REGION/CODEDEPLOY_BUCKET
  # 시크릿을 등록한 뒤 if: false를 지우면 바로 동작한다.
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/passpoint:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name PassPoint \
            --deployment-group-name PassPoint-DeploymentGroup \
            --s3-location bucket=${{ secrets.CODEDEPLOY_BUCKET }},key=appspec.zip,bundleType=zip
