      OPENAI_API_KEY: dummy-key-for-ci
      GOOGLE_CLIENT_ID: dummy-client-id.apps.googleusercontent.com
      JWT_SECRET: ci-only-test-secret-0123456789abcdef0123456789abcdef
      # 실제 Firebase 프로젝트와 무관한 더미 서비스 계정 키 (구조만 유효, 어떤 계정에도 접근 못 함) - FirebaseConfig 빈 생성용
