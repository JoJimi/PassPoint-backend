version: 0.0
os: linux
files:
  - source: scripts
    destination: /home/ec2-user/passpoint/scripts
hooks:
  ApplicationStop:
    - location: scripts/stop_application.sh
      timeout: 60
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 180
      runas: ec2-user
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 120
      runas: ec2-user
